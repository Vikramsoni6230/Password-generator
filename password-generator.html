<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: #0f0f0f;
      color: #f0ede6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
    }

    /* Password Display */
    .pw-display {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 54px;
    }

    .pw-text {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      color: #e8e4dd;
      word-break: break-all;
      line-height: 1.5;
      flex: 1;
    }

    .pw-text.placeholder { color: #444; }

    .copy-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid #333;
      border-radius: 7px;
      padding: 6px 12px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover { border-color: #555; color: #ccc; background: #222; }
    .copy-btn.copied { border-color: #1D9E75; color: #1D9E75; }

    /* Strength */
    .strength-bar {
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.35s ease, background 0.35s ease;
      width: 0%;
    }

    .strength-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .strength-label { font-weight: 500; }
    .entropy-label { color: #555; }

    /* Slider */
    .slider-row { display: flex; flex-direction: column; gap: 8px; }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #888;
    }

    .slider-label span { font-weight: 500; color: #ccc; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f0ede6;
      border: 2px solid #0f0f0f;
      box-shadow: 0 0 0 1px #444;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { box-shadow: 0 0 0 3px #333; }

    /* Options */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .option-chip {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      padding: 9px 12px;
      border: 1px solid #222;
      border-radius: 9px;
      transition: all 0.15s;
      user-select: none;
    }

    .option-chip:hover { border-color: #333; color: #aaa; }

    .option-chip.active {
      border-color: rgba(29,158,117,0.5);
      color: #1D9E75;
      background: rgba(29,158,117,0.07);
    }

    .dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .option-chip.active .dot::after {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1D9E75;
      display: block;
    }

    /* Generate button */
    .gen-btn {
      width: 100%;
      padding: 13px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      border: 1px solid #333;
      border-radius: 10px;
      background: none;
      color: #ccc;
      cursor: pointer;
      transition: all 0.15s;
    }

    .gen-btn:hover { background: #222; border-color: #444; color: #f0ede6; }
    .gen-btn:active { transform: scale(0.99); }
  </style>
</head>
<body>

<div class="card">
  <div class="card-title">Password Generator</div>

  <div class="pw-display">
    <span class="pw-text placeholder" id="pw-output">Click generate below</span>
    <button class="copy-btn" id="copy-btn" onclick="copyPw()">Copy</button>
  </div>

  <div>
    <div class="strength-bar">
      <div class="strength-fill" id="strength-fill"></div>
    </div>
    <div class="strength-row" style="margin-top:6px;">
      <span class="strength-label" id="strength-label" style="color:#444;">—</span>
      <span class="entropy-label" id="entropy-label"></span>
    </div>
  </div>

  <div class="slider-row">
    <div class="slider-label">
      Length <span id="len-val">16</span>
    </div>
    <input type="range" min="6" max="64" value="16" id="len-slider"
      oninput="document.getElementById('len-val').textContent=this.value; generate()">
  </div>

  <div class="options-grid" id="opts">
    <div class="option-chip active" data-key="upper" onclick="toggleOpt(this)">
      <span class="dot"></span> Uppercase A–Z
    </div>
    <div class="option-chip active" data-key="lower" onclick="toggleOpt(this)">
      <span class="dot"></span> Lowercase a–z
    </div>
    <div class="option-chip active" data-key="nums" onclick="toggleOpt(this)">
      <span class="dot"></span> Numbers 0–9
    </div>
    <div class="option-chip active" data-key="syms" onclick="toggleOpt(this)">
      <span class="dot"></span> Symbols !@#$
    </div>
  </div>

  <button class="gen-btn" onclick="generate()">Generate Password</button>
</div>

<script>
  const chars = {
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower: 'abcdefghijklmnopqrstuvwxyz',
    nums:  '0123456789',
    syms:  '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  let opts = { upper: true, lower: true, nums: true, syms: true };

  function toggleOpt(el) {
    const k = el.dataset.key;
    const active = document.querySelectorAll('#opts .option-chip.active');
    if (el.classList.contains('active') && active.length === 1) return;
    opts[k] = !opts[k];
    el.classList.toggle('active', opts[k]);
    generate();
  }

  function generate() {
    let pool = '';
    Object.keys(opts).forEach(k => { if (opts[k]) pool += chars[k]; });
    if (!pool) return;

    const len = parseInt(document.getElementById('len-slider').value);
    let pw = '';
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    for (let i = 0; i < len; i++) pw += pool[arr[i] % pool.length];

    const out = document.getElementById('pw-output');
    out.textContent = pw;
    out.classList.remove('placeholder');

    const copyBtn = document.getElementById('copy-btn');
    copyBtn.textContent = 'Copy';
    copyBtn.classList.remove('copied');

    updateStrength(pw, pool.length);
  }

  function updateStrength(pw, poolSize) {
    const entropy = pw.length * Math.log2(poolSize);
    let label, color, pct;

    if (entropy < 40)      { label = 'Weak';        color = '#E24B4A'; pct = 25; }
    else if (entropy < 60) { label = 'Fair';        color = '#EF9F27'; pct = 50; }
    else if (entropy < 80) { label = 'Strong';      color = '#1D9E75'; pct = 75; }
    else                   { label = 'Very Strong'; color = '#1D9E75'; pct = 100; }

    document.getElementById('strength-fill').style.width = pct + '%';
    document.getElementById('strength-fill').style.background = color;
    document.getElementById('strength-label').textContent = label;
    document.getElementById('strength-label').style.color = color;
    document.getElementById('entropy-label').textContent = Math.round(entropy) + ' bits';
  }

  function copyPw() {
    const pw = document.getElementById('pw-output').textContent;
    if (!pw || pw === 'Click generate below') return;
    navigator.clipboard.writeText(pw).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>
</body>
</html>
